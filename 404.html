<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Saffron & Stone Design Studio</title>
  <meta name="description" content="The page you're looking for couldn't be found.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#F6EFE7',
            saffron: '#873F2B',
            taupe: '#C9B8A6',
            bronze: '#C58A52',
            olive: '#7A7F5D'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --color-cream: #F6EFE7;
      --color-saffron: #873F2B;
      --color-taupe: #C9B8A6;
      --color-bronze: #C58A52;
      --color-olive: #7A7F5D;
    }

    .fade-in {
      animation: fadeIn 0.8s ease-in forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-hover {
      transition: all 0.3s ease;
    }

    .btn-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(135, 63, 43, 0.3);
    }
  </style>
</head>

<body class="bg-cream text-saffron font-sans antialiased">

  <!-- 404 Content -->
  <div class="min-h-screen flex items-center justify-center px-4 py-16">
    <div class="max-w-2xl mx-auto text-center fade-in">

      <!-- Large 404 Number -->
      <div class="mb-8">
        <h1 class="text-[150px] md:text-[200px] font-serif font-bold text-saffron leading-none opacity-20">
          404
        </h1>
      </div>

      <!-- Message -->
      <div class="mb-12">
        <h2 class="text-4xl md:text-5xl font-serif font-semibold text-saffron mb-4">
          Page Not Found
        </h2>
        <p class="text-lg md:text-xl text-taupe font-light max-w-md mx-auto">
          The page you're looking for seems to have wandered off. Perhaps it's been redesigned into something beautiful.
        </p>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <a href="/"
           class="btn-hover inline-block px-8 py-4 bg-saffron text-cream font-medium rounded-sm hover:bg-opacity-90">
          Return Home
        </a>
        <a href="/#contact"
           class="btn-hover inline-block px-8 py-4 border-2 border-saffron text-saffron font-medium rounded-sm hover:bg-saffron hover:text-cream">
          Contact Us
        </a>
      </div>

      <!-- Decorative Element -->
      <div class="mt-16 flex justify-center gap-2">
        <div class="w-2 h-2 rounded-full bg-bronze"></div>
        <div class="w-2 h-2 rounded-full bg-taupe"></div>
        <div class="w-2 h-2 rounded-full bg-olive"></div>
      </div>
    </div>
  </div>

</body>

</html>
